name: Build MeshCommander Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - Dockerfile
      - build_run.sh
      - docker-compose.yml
      - .github/workflows/build-meshcommander.yml
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve MeshCommander version from npm
        id: meshcommander
        shell: bash
        run: |
          set -euo pipefail
          version="$(npm view meshcommander version)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Resolved MeshCommander version: ${version}"

      - name: Prepare image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/meshcommander" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether version tag already exists
        id: existing
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          VERSION: ${{ steps.meshcommander.outputs.version }}
        run: |
          set -euo pipefail
          if docker buildx imagetools inspect "${IMAGE_NAME}:${VERSION}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "Image tag already exists: ${IMAGE_NAME}:${VERSION}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
            echo "Image tag does not exist yet: ${IMAGE_NAME}:${VERSION}"
          fi

      - name: Generate Docker metadata
        id: meta
        if: steps.existing.outputs.exists != 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ steps.meshcommander.outputs.version }}
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push image
        if: steps.existing.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            MESHCOMMANDER_VERSION=${{ steps.meshcommander.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Report skipped build
        if: steps.existing.outputs.exists == 'true'
        run: echo "Skipping build because the MeshCommander version tag already exists in GHCR."
